<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  {% if site.description %}<meta name="description" content="{{ site.description }}">{% endif %}
  <link rel="stylesheet" href="{{ '/assets/css/app.css' | relative_url }}">
</head>
<body>
  <div class="site-wrap">
    <header class="site-header">
      <div class="site-brand">{{ site.title }}</div>
      <p class="site-tagline">{{ site.description }}</p>
      <nav class="site-nav" aria-label="Site">
        <a href="{{ '/' | relative_url }}" {% if page.path == 'index.md' %}aria-current="page"{% endif %}>Home</a>
        <a href="{{ '/privacy-policy/' | relative_url }}" {% if page.path contains 'privacy-policy' %}aria-current="page"{% endif %}>Privacy Policy</a>
        <a href="{{ '/deletion/' | relative_url }}" {% if page.path contains 'deletion' %}aria-current="page"{% endif %}>Account deletion</a>
      </nav>
    </header>

    <main class="content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <a href="mailto:hello.lifeassistant@gmail.com">hello.lifeassistant@gmail.com</a>
    </footer>
  </div>
</body>
</html>
